name: Daily Report

on:
  schedule:
    - cron: '0 0 * * *'        # 每日 UTC 00:00（北京时间 08:00）
  workflow_dispatch:

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # 中文 OG image 字体（OFL 开源许可，~50MB apt 安装）
      - name: Install CJK fonts for OG image
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk fonts-noto-cjk-extra

      - run: pip install -r requirements.txt

      - name: Generate daily report
        env:
          # LLM（三者必需，无默认值；BASE_URL 放 secrets 避免暴露自建网关地址）
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          # 数据源（可选）
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: dailydawn/0.1
        run: python scripts/main.py

      # 生成今日双语 OG image（Pillow），失败不阻塞主流程
      - name: Generate OG image
        continue-on-error: true
        run: |
          python scripts/generate_og.py
          # 默认 OG 仅在不存在时生成（首次运行 / 强制刷新）
          if [ ! -f og/default.png ]; then
            python scripts/generate_og.py --default
          fi

      # README 顶部注入「最近 3 期日报」链接（双向引流：GitHub → 站点）
      - name: Sync README latest issues
        continue-on-error: true
        run: python scripts/update_readme.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add zh/ en/ meta/ og/ README.md README.en.md
          if git diff --staged --quiet; then
            echo "No new content (likely no change)."
            exit 0
          fi
          git commit -m "chore: daily report $(date -u +%Y-%m-%d)"
          # push 兜底：远端被外部/并发推进时（non-fast-forward），rebase 到最新 main 后重试。
          # 日报产物按日期命名，与外部改动（如脚本/配置）几乎不重叠，rebase 通常零冲突；
          # 万一真冲突则 abort 并报错退出，绝不静默选边覆盖（人工介入）。
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing onto origin/main..."
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort
              echo "::error::Rebase hit a conflict; aborting. Manual intervention required."
              exit 1
            fi
          done
          echo "::error::git push still failing after 5 attempts."
          exit 1

      - name: Notify web layer
        if: success()
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.WEB_WEBHOOK_URL }}" ]; then
            # main.py 会把 {date, summary_zh, summary_en, topics_zh, topics_en} 写到 /tmp/dailydawn-summary.json
            # 读不到文件时（老版本 main.py / 写入失败）fallback 用仅 date 的 payload
            if [ -f /tmp/dailydawn-summary.json ]; then
              curl -X POST "${{ secrets.WEB_WEBHOOK_URL }}" \
                -H "X-Webhook-Secret: ${{ secrets.WEB_WEBHOOK_SECRET }}" \
                -H "Content-Type: application/json" \
                --data-binary @/tmp/dailydawn-summary.json \
                --max-time 30
            else
              curl -X POST "${{ secrets.WEB_WEBHOOK_URL }}" \
                -H "X-Webhook-Secret: ${{ secrets.WEB_WEBHOOK_SECRET }}" \
                -H "Content-Type: application/json" \
                -d "{\"date\":\"$(date -u +%Y-%m-%d)\"}" \
                --max-time 30
            fi
          fi
